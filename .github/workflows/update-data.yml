# Runs the Medicaid data pipeline on a schedule and commits the
# updated JSON files so Vercel can deploy them automatically.
#
# Schedule: daily at 6:00 AM UTC (midnight CT).
# Can also be triggered manually from the Actions tab.

name: Update Dashboard Data

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6 AM UTC
  workflow_dispatch:        # allow manual runs from GitHub UI

permissions:
  contents: write           # needed to push updated JSON files

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Run data pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        working-directory: data-pipeline
        run: python orchestrator.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update pipeline data ($(date -u +%Y-%m-%d))"
          git push
